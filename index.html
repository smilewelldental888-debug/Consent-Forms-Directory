<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Smile Well Dental consent form library with previews, related media, and signature access."
    />
    <meta name="theme-color" content="#f4efe8" />
    <title>Smile Well Consent Library</title>
    <link
      rel="preload"
      href="./assets/fonts/Manrope-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/Manrope-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/CormorantGaramond-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="./assets/fonts/fonts.css" />
    <script src="./theme-boot.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./assets/favicon.ico" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Consent form library">
        <header class="sidebar__header">
          <div class="sidebar__brand">
            <img
              class="sidebar__logo"
              src="./assets/smilewell-logo-stacked-en.png"
              alt="Smile Well Dental logo"
              decoding="async"
            />
            <div class="sidebar__brand-copy">
              <p class="eyebrow" data-i18n="sidebarEyebrow">Consent</p>
              <h1 data-i18n="sidebarTitle">Consent Library</h1>
            </div>
          </div>
        </header>

        <section class="sidebar__list-wrap">
          <p class="sidebar__section-label" data-i18n="sidebarSectionLabel">Available Forms</p>
          <div id="formList" class="form-list" role="list"></div>
        </section>

        <footer class="sidebar__footer">
          <div class="sidebar__footer-stack">
            <div class="control-group">
              <label class="control-label" for="locationSelect" data-i18n="locationLabel">Location</label>
              <div class="select-shell">
                <select id="locationSelect" class="language-select" aria-label="Location" aria-describedby="locationSelectError">
                </select>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
              <p id="locationSelectError" class="location-load-error sr-only" role="status" aria-live="polite"></p>
            </div>

            <div class="control-group">
              <label class="control-label" for="languageSelect" data-i18n="languageLabel">Language</label>
              <div class="select-shell">
                <select id="languageSelect" class="language-select" aria-label="Language">
                  <option value="en">English</option>
                  <option value="ko">한국어</option>
                </select>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </div>
            </div>

            <div class="control-group theme-picker" role="group" aria-labelledby="themeLabel">
              <span id="themeLabel" class="control-label" data-i18n="themeLabel">Appearance</span>
              <div class="theme-toggle">
                <button type="button" class="theme-toggle__button" data-theme-value="light">
                  <span data-i18n="themeLight">Light</span>
                </button>
                <button type="button" class="theme-toggle__button" data-theme-value="dark">
                  <span data-i18n="themeDark">Dark</span>
                </button>
              </div>
            </div>

          </div>
        </footer>
      </aside>

      <section class="workspace" aria-label="Consent form workspace">
        <div id="emptyState" class="empty-state">
          <div class="empty-state__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7l-4-4Z" />
              <path d="M14 3v4h4M9 12h6M9 16h6" />
            </svg>
          </div>
          <p class="empty-state__eyebrow" data-i18n="emptyEyebrow">Workspace</p>
          <h2 data-i18n="emptyTitle">Select a consent form</h2>
          <p data-i18n="emptyBody">
            Preview the form, review related media, and open the signature flow from this workspace.
          </p>
        </div>

        <div id="detailShell" class="detail-shell is-hidden">
          <header class="detail-shell__header">
            <div class="detail-shell__intro">
              <div class="detail-brand">
                <img
                  class="detail-brand__wordmark"
                  src="./assets/smilewell-logo-horizontal-en.png"
                  alt="Smile Well Dental"
                  decoding="async"
                />
                <div class="detail-shell__titles">
                  <p class="detail-shell__eyebrow" data-i18n="detailEyebrow">Smile Well Dental</p>
                  <h2 class="detail-shell__title" data-i18n="detailTitle">Patient Consent Forms</h2>
                </div>
              </div>
            </div>

            <div class="detail-toolbar">
              <div class="tab-bar" role="tablist" aria-label="Content views">
                <span class="tab-bar__slider" aria-hidden="true"></span>
                <button id="tab-form" type="button" class="tab-button is-active" data-tab="form" role="tab" aria-controls="panel-form" aria-selected="true" tabindex="0">
                  <span class="tab-button__label" data-i18n="tabForm">Preview</span>
                </button>
                <button id="tab-youtube" type="button" class="tab-button" data-tab="youtube" role="tab" aria-controls="panel-youtube" aria-selected="false" tabindex="-1">
                  <span class="tab-button__label" data-i18n="tabYouTube">Video</span>
                </button>
                <button id="tab-drive" type="button" class="tab-button" data-tab="drive" role="tab" aria-controls="panel-drive" aria-selected="false" tabindex="-1">
                  <span class="tab-button__label" data-i18n="tabDrive">Files</span>
                </button>
              </div>
            </div>

            <div class="detail-shell__primary">
              <a
                id="signFormTabButton"
                class="action-button action-button--sign"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              >
                <span class="action-button__label" data-i18n="signTabAction">Open Signature Form</span>
              </a>
            </div>
          </header>

          <div id="detailBody" class="detail-body"></div>
        </div>
      </section>
    </main>

    <div id="announcer" class="sr-only" aria-live="polite"></div>
    <!-- PDF.js -->
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    </script>
    <script type="module" src="./app.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
